<!DOCTYPE html>

<!-- OPTIMAL RESOLUTION: 1920x1080 -->

<html>

<head>
    <title>zunderstream Windows 98</title>
    <link rel="stylesheet" type="text/css" href="./styles/shared.css" />
    <link rel="stylesheet" type="text/css" href="./styles/win98.css" />
    <style type="text/css">
        #chat-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 200px;
            display: flex;
            flex-direction: column;
        }

        #chat-container>div {
            box-sizing: border-box;
            width: 100%;
            border: solid 1px black;
            background-color: #FFFF99;
            color: black;
            padding: 8px;
            font-size: 10px;
            display: flex;
            flex-direction: row;
            align-items: start;
            justify-content: start;
        }

        /* Message envelope icon */
        #chat-container .envelope {
            padding-right: 8px;
        }

        /* Message content */
        #chat-container .message-container {
            max-width: 155px;
            overflow-wrap: break-word;
        }

        #chat-container .username {
            display: block;
            margin: 2px 0 4px;
            font-weight: bold;
        }

        #chat-container .message-container>img {
            height: 10px;
        }

        #chat-container>div+div {
            margin-top: 16px;
        }

        #alert-popup {
            position: fixed;
            width: 500px;
            height: 200px;
            z-index: 100000;
        }

        #alert-content-container {
            width: 100%;
            height: calc(100% - 22px);
            margin-top: 2px;
            /** Emulate same border as pressed button **/
            box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a, inset -2px -2px #dfdfdf, inset 2px 2px grey;
        }

        #alert-content {
            position: absolute;
            top: 27px;
            bottom: 5px;
            left: 5px;
            right: 5px;
            padding: 16px;
            font-family: "Comic Sans MS";
            font-size: 24px;
            display: flex;
            flex-direction: row;
            align-items: center;
        }

        #alert-content a {
            text-decoration: underline;
        }

        #alert-image {
            max-height: 100px;
            max-width: 100px;
            width: 100px;
            margin-right: 16px;
        }

        #alert-text>.small {
            font-size: 14px;
        }

        .alert-colors-1 {
            background-color: darkblue;
            color: gold
        }

        .alert-colors-2 {
            background-color: gold;
            color: darkred
        }

        .alert-colors-3 {
            background-color: hotpink;
            color: blue
        }

        .alert-colors-4 {
            background-color: gold;
            color: darkslateblue
        }

        .alert-colors-5 {
            background-color: darkred;
            color: white
        }

        .animated {
            animation: animated 1s step-end 0s infinite;
        }

        @keyframes animated {
            0% {
                filter: none;
            }

            50% {
                filter: invert();
            }

            100% {
                filter: none;
            }
        }

        #dialup-window {
            position: fixed;
            top: 160px;
            left: 330px;
            width: 300px;
            height: 100px;
        }

        #dialup-window .window-body {
            display: flex;
        }

        #dialup-text {
            margin-left: 8px;
            vertical-align: top;
        }

        #dialup-buttons {
            position: absolute;
            bottom: 8px;
            right: 8px;
        }
    </style>
    <script src="./scripts/reconnecting-websocket.js"></script>
    <script src="./scripts/zunderstream-base.js"></script>
</head>

<body>
    <div id="chat-container">

    </div>

    <div id="alert-popup" class="window hidden">
        <div id="title-bar" class="title-bar">
            <div class="title-bar-wrapper">
                <div class="title-bar-text">
                    <span id="alert-title">ALERT</span>
                </div>
            </div>
            <div class="title-bar-controls">
                <button aria-label="Close"></button>
            </div>
        </div>
        <div id="alert-content-container">
            <div id="alert-content">
                <div>
                    <img id="alert-image" />
                </div>
                <div id="alert-text"></div>
            </div>
        </div>
    </div>

    <div id="dialup-window" class="window hidden">
        <div id="title-bar" class="title-bar">
            <div class="title-bar-wrapper">
                <div class="title-bar-icon">
                    <img src="./images/win98/dial_up_32x32.png">
                </div>
                <div class="title-bar-text">
                    <span id="dialup-title">Connecting to My Connection</span>
                </div>
            </div>
            <div class="title-bar-controls">
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <div id="dialup-animation">
                <img src="./images/win98/dial_up_anim.png" />
            </div>
            <div id="dialup-text">Connecting to Twitch raid...</div>
            <div id="dialup-buttons">
                <button>Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initAgent } from "https://cdn.jsdelivr.net/npm/clippyjs/dist/index.mjs";
        import * as agents from "https://cdn.jsdelivr.net/npm/clippyjs/dist/agents/index.mjs";
        let agent;

        async function loadClippy() {
            agent = await initAgent(agents.Clippy);

            agent.moveTo(780, 220);
            agent.show();
            agent.play("Greeting");

            setInterval(checkRedemption, 5000);
        }

        function checkRedemption(redemption) {
            if (redemption != null && redemption !== "") {
                agent.animate();
                setFirebotCustomVariable("win98Redeemed", true, 5);
            }
        }

        function deleteChatMessage(messageId) {
            document.getElementById(messageId)?.remove();
        }

        function showChatMessage(message) {
            const elem = document.createElement("div");
            elem.id = message.id;
            elem.innerHTML = `<div><img class="envelope" src="./images/win98/message_envelope_open_16x16.png"></div><div class="message-container"><span class="username">${message.sender}</span>${message.message}</div>`;

            document.getElementById("chat-container").appendChild(elem);

            setTimeout(() => {
                deleteChatMessage(message.id);
            }, 8000)
        }

        function showPopup(popupData) {
            setElementStyleProperty("alert-popup", "top", `${Math.floor(Math.random() * 320)}px`);
            setElementStyleProperty("alert-popup", "left", `${Math.floor(Math.random() * 440)}px`);

            setElementText("alert-title", popupData.title);
            setElementContents("alert-text", popupData.message);
            setImageSource("alert-image", popupData.image);

            const colorScheme = Math.floor(Math.random() * 6);
            addClassToElement("alert-content", `alert-colors-${colorScheme}`);

            if (popupData.animated === true || popupData.animated === "true") {
                addClassToElement("alert-content", "animated");
            }

            removeClassFromElement("alert-popup", "hidden");

            setTimeout(() => {
                addClassToElement("alert-popup", "hidden");
                removeClassFromElement("alert-popup", `alert-colors-${colorScheme}`);
                removeClassFromElement("alert-content", "animated");
            }, (popupData?.duration ?? 5) * 1000);
        }

        function showDialupWindow(data) {
            const title = data?.connName?.length
                ? data.connName
                : "My Connection";

            setElementText("dialup-title", `Connecting to ${title}`)
            removeClassFromElement("dialup-window", "hidden");
        }

        function hideDialupWindow() {
            addClassToElement("dialup-window", "hidden");
        }

        function setDialupText(text) {
            setElementContents("dialup-text", text);
        }

        document.addEventListener("DOMContentLoaded", async () => {
            setTimeout(loadClippy, 1 * 1000);

            zunderstreamEvents.on(`${customVariableEventName}:win98RedemptionId`, checkRedemption);

            zunderstreamEvents.on(chatMessageEventName, showChatMessage);

            zunderstreamEvents.on(chatMessageDeletedEventName, (message) => {
                deleteChatMessage(message.id);
            });

            zunderstreamEvents.on(zunderstreamWin98PopupEventName, (popupData) => {
                showPopup(popupData);
            });

            zunderstreamEvents.on(zunderstreamWin98ShowDialupWindowEventName, (data) => {
                showDialupWindow(data);
            });

            zunderstreamEvents.on(zunderstreamWin98HideDialupWindowEventName, () => {
                hideDialupWindow();
            });

            zunderstreamEvents.on(zunderstreamWin98SetDialupTextEventName, (data) => {
                setDialupText(data.text);
            });
        });
    </script>
</body>

</html>
