<!DOCTYPE html>

<!-- OPTIMAL RESOLUTION: 1920x1080 -->

<html>

<head>
    <title>zunderstream Windows 98</title>
    <link rel="stylesheet" type="text/css" href="./styles/shared.css" />
    <link rel="stylesheet" type="text/css" href="./styles/win98.css" />
    <style type="text/css">
        #desktop {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: #008081;
        }

        #taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 26px;
            padding: 2px;
            box-sizing: border-box;
            background: silver;
            box-shadow: 0 -1px #fff, 0 -2px #dfdfdf;
            display: flex
        }

        #taskbar>* {
            height: 22px;
            box-sizing: border-box;
            display: inline-block;
            flex-shrink: 0;
        }

        #taskbar * {
            vertical-align: middle;
        }

        #taskbar .button {
            padding: 2px;
            box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #fff, inset -2px -2px grey, inset 2px 2px #dfdfdf;
        }

        #taskbar img {
            height: 16px;
        }

        .taskbar-separator {
            width: 2px;
            margin: 0 2px;
            box-shadow: inset -1px 0 #fff, inset 1px 0 #808080;
        }

        .taskbar-handle {
            margin: auto 0;
            height: 18px !important;
            width: 3px;
            box-shadow: inset -1px -1px #808080, inset 1px 1px #fff;
        }

        #start-button {
            font-weight: bold;
            width: auto;
            min-width: 0;
            padding: 4px !important;
        }

        #start-button img {
            height: 14px !important;
            margin-right: 4px;
            vertical-align: middle;
        }

        #taskbar-quick-launch {
            display: inline-flex;
            align-items: center;
            margin-left: 4px;
        }

        #taskbar-quick-launch>* {
            margin: 0 3px;
        }

        #taskbar-applications {
            display: inline-flex;
            flex: 1;
            padding: 0 2px;
        }

        .taskbar-application {
            position: relative;
            display: inline-flex;
            align-items: center;
            max-width: 160px;
            padding: 3px 4px;
            margin-right: 3px;
            flex: 1 1 0px;
            box-shadow: inset -1px -1px #0a0a0a, inset 1px 1px #fff, inset -2px -2px grey, inset 2px 2px #dfdfdf;
        }

        .taskbar-application>img {
            width: 16px;
        }

        .taskbar-application>.title {
            position: absolute;
            display: inline-block;
            width: calc(100% - 26px);
            margin-left: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .taskbar-application.active {
            background-color: #e0e0e0;
            box-shadow: inset -1px -1px #fff, inset 1px 1px #0a0a0a, inset -2px -2px #dfdfdf, inset 2px 2px grey;
            font-weight: bold;
        }

        #system-tray {
            display: flex;
            padding: 3px 0 3px 3px;
            box-shadow: inset -1px -1px #fff, inset 1px 1px #808080;
        }

        #system-tray-clock {
            margin-top: 3px;
            margin-right: 8px;
            width: 52px;
            text-align: right;
        }

        #discord-active-desktop {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 300px;
            background-color: #000;
        }

        #discord-active-desktop img {
            width: 100%;
        }
    </style>
    <script src="./scripts/reconnecting-websocket.js"></script>
    <script src="./scripts/zunderstream-base.js"></script>
</head>

<body>
    <div id="desktop"></div>

    <div id="taskbar">
        <div id="start-button" class="button">
            <img src="./images/z_icon.png"><span>Start</span>
        </div>
        <div class="taskbar-separator"></div>
        <div class="taskbar-handle"></div>
        <div id="taskbar-quick-launch">
            <img src="./images/win98/edge_32x32.png">
            <img src="./images/win98/obs_32x32.png">
            <img src="./images/win98/firebot_32x32.png">
        </div>
        <div class="taskbar-separator"></div>
        <div class="taskbar-handle"></div>
        <div id="taskbar-applications">
            <div id="Win98 Content Group" class="taskbar-application active">
                <img src="./images/win98/input_devices_32x32.png">
                <span class="title" id="taskbar-stream-title">zunderstream Content</span>
            </div>
            <div id="Win98 Camera Group" class="taskbar-application">
                <img src="./images/win98/camera_32x32.png">
                <span class="title">Camera Feed</span>
            </div>
            <div id="Win98 Media Player" class="taskbar-application">
                <img src="./images/win98/media_player_32x32.png">
                <span class="title">Media Player</span>
            </div>
        </div>
        <div id="system-tray">
            <div id="system-tray-icons">
                <img src="./images/win98/loaf_32x32.png">
                <img src="./images/win98/bean_32x32.png">
                <img src="./images/win98/wow_32x32.png">
            </div>
            <div id="system-tray-clock"></div>
        </div>
    </div>

    <div id="discord-active-desktop" class="hidden">
        <img src="./images/win98/voice_header.png">
    </div>

    <script type="text/javascript">
        let streamTitle = "";

        function updateClock() {
            const date = new Date();

            const hourDiff = date.getHours() % 12;
            const hours = hourDiff === 0 ? 12 : hourDiff;

            setElementText("system-tray-clock", `${hours}:${String(date.getMinutes()).padStart(2, "0")} ${date.getHours() > 11 ? "PM" : "AM"}`);
        }

        function refreshLowerThird(newStreamTitle) {
            try {
                if (newStreamTitle != null && newStreamTitle !== streamTitle) {
                    streamTitle = newStreamTitle;
                    setElementContents("taskbar-stream-title", streamTitle);
                }
            } catch { }
        }

        function setActiveWindow(windowId) {
            let appList = document.getElementById("taskbar-applications").getElementsByClassName("taskbar-application");

            for (const item of appList) {
                item.classList.remove("active");
            }

            document.getElementById(windowId)?.classList?.add("active");
        }

        document.addEventListener("DOMContentLoaded", async () => {
            updateClock();
            refreshLowerThird(await getStreamTitle());

            setInterval(updateClock, 1000);

            zunderstreamEvents.on(zunderstreamTitleUpdatedEventName, (data) => {
                refreshLowerThird(data.title);
            });

            zunderstreamEvents.on(zunderstreamWin98SetActiveWindowEventName, (data) => {
                setActiveWindow(data.windowId);
            });
        });
    </script>
</body>

</html>
